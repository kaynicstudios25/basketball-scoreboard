<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="home">
                <h3>HOME</h3>
                <h1 id="home-score">0</h1>
                <div class="btn-el">
                    <button id="home-points" onclick="add1HPoint()">+1</button>
                    <button id="home-points" onclick="add2HPoints()">+2</button>
                    <button id="home-points" onclick="add3HPoints()">+3</button>
                </div>
            </div>
            <div class="guest">
                <h3>GUEST</h3>
                <h1 id="guest-score">0</h1>
                <div class="btn-el">
                    <button id="guest-points" onclick="add1GPoint()">+1</button>
                    <button id="guest-points" onclick="add2GPoints()">+2</button>
                    <button id="guest-points" onclick="add3GPoints()">+3</button>
                </div>
            </div>
        </div>
        <script>
            let hScore = document.getElementById("home-score")
            let gScore = document.getElementById("guest-score")
            console.log(gScore)

            let homeScore = 0
            let guestScore = 0

            function updateScoreboard() {
                hScore.textContent = homeScore
                gScore.textContent = guestScore

                // Check for Home leader
                if (homeScore > guestScore) {
                    hScore.classList.add('win')
                } else {
                    hScore.classList.remove('win')
                }

                // Check for Guest leader
                if (guestScore > homeScore) {
                    gScore.classList.add('win')
                } else {
                    gScore.classList.remove('win')
                }
            }

            function add1HPoint() {
                homeScore += 1
                updateScoreboard()
            }

            function add2HPoints() {
                homeScore += 2
                updateScoreboard()
            }

            function add3HPoints() {
                homeScore += 3
                updateScoreboard()
            }



            function add1GPoint() {
                guestScore += 1
                updateScoreboard()
            }

            function add2GPoints() {
                guestScore += 2
                updateScoreboard()
            }

            function add3GPoints() {
                guestScore += 3
                updateScoreboard()
            }

        </script>
    </body>
</html>
